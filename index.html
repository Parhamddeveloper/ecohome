<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="اکوهوم، برای شما دکوراسیون هایی میسازد که علاوه بر زیبایی، با محیط زیست هم سازگار است و در فرایند تولید هیچ آلودگی تولید نمیکند. بام ام خانه خود را تزیین کنید">
    <link rel="icon" type="image/x-icon" href="/Logo128x128.ico" />
    <title>ecohome made by Parham Daneshnejad</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const theme = localStorage.getItem("theme");

      if (
        theme === "dark" ||
        (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </body>
</html>
